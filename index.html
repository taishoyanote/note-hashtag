<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>note ハッシュタグ探索</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #faf8f4;
  min-height: 100vh;
  color: #1a1a1a;
  padding-bottom: 60px;
}
.header {
  padding: 40px 24px 20px;
  border-bottom: 1px solid #e8e4de;
  display: flex;
  align-items: baseline;
  gap: 12px;
}
.logo { font-family: 'Noto Serif JP', serif; font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
.logo-sub { font-size: 13px; color: #1a1a1a; font-weight: 400; letter-spacing: 0.05em; }
.search-wrap { padding: 32px 24px 0; max-width: 780px; margin: 0 auto; }
.search-box {
  display: flex;
  align-items: center;
  background: #fff;
  border: 1.5px solid #d8d2ca;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.hash { padding: 0 4px 0 16px; font-size: 20px; color: #41c9b4; font-weight: 600; user-select: none; }
input {
  flex: 1; border: none; outline: none;
  padding: 14px 8px; font-size: 15px;
  font-family: 'Noto Sans JP', sans-serif;
  background: transparent;
}
.btn {
  padding: 14px 24px; background: #41c9b4; color: #fff;
  border: none; font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
}
.btn:disabled { background: #a8e8df; cursor: not-allowed; }
.loading {
  display: flex; align-items: center; gap: 10px;
  margin-top: 12px; justify-content: center;
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid #e0e0e0;
  border-top: 2px solid #41c9b4;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: #1a1a1a; }
.error {
  max-width: 780px; margin: 16px auto 0;
  padding: 12px 24px; background: #fff3f3;
  color: #c0392b; border-left: 3px solid #c0392b; font-size: 13px;
}
.results { max-width: 780px; margin: 32px auto 0; padding: 0 24px; }

/* メインタグカード */
.main-card {
  background: #fff; border: 1px solid #e8e4de;
  border-radius: 6px; padding: 24px 28px; margin-bottom: 32px;
}
.main-tag-name { font-family: 'Noto Serif JP', serif; font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.main-tag-count { font-size: 32px; font-weight: 600; color: #41c9b4; letter-spacing: -1px; }
.main-tag-count-sub { font-size: 14px; color: #1a1a1a; font-weight: 300; }

/* セクションタイトル */
.section-title {
  font-size: 13px; font-weight: 500; color: #1a1a1a;
  letter-spacing: 0.05em; margin-bottom: 16px;
}

/* 芋づる展開エリア */
.tree-wrap { display: flex; flex-direction: column; gap: 16px; }

.branch {
  background: #fff; border: 1px solid #e8e4de;
  border-radius: 6px; overflow: hidden;
}
.branch-header {
  display: flex; align-items: center;
  padding: 14px 20px; gap: 12px;
  border-bottom: 1px solid #f0ede8;
  background: #fdfcfa;
}
.branch-tag {
  font-size: 15px; font-weight: 500; color: #1a1a1a;
}
.branch-count {
  font-size: 13px; color: #41c9b4; font-weight: 500;
  margin-left: auto;
}
.branch-count-label { font-size: 11px; color: #1a1a1a; font-weight: 300; }

.sub-tags {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 14px 20px;
}
.sub-tag {
  background: #f5f3ef; border: 1px solid #e8e4de;
  border-radius: 40px; padding: 5px 12px;
  font-size: 12px; color: #1a1a1a;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  display: inline-flex; align-items: center; gap: 5px;
  transition: all 0.15s;
}
.sub-tag:hover { background: #e8f8f5; border-color: #41c9b4; color: #1a1a1a; }
.sub-tag-count { font-size: 13px; color: #41c9b4; font-weight: 500; }

.no-related { padding: 14px 20px; font-size: 13px; color: #1a1a1a; }

.footer { text-align: center; font-size: 13px; color: #1a1a1a; margin-top: 40px; line-height: 2; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">note</span>
  <span class="logo-sub">ハッシュタグ探索</span>
</div>

<div class="search-wrap">
  <div class="search-box">
    <span class="hash">#</span>
    <input type="text" id="tagInput" placeholder="ハッシュタグを入力" />
    <button class="btn" id="searchBtn" onclick="doSearch()">検索</button>
  </div>
  <div class="loading hidden" id="loading">
    <div class="spinner"></div>
    <span class="loading-text" id="loadingMsg">noteからデータを取得しています...</span>
  </div>
</div>

<div class="error hidden" id="error"></div>

<div class="results hidden" id="results">
  <div class="main-card">
    <div class="main-tag-name" id="mainTagName"></div>
    <div class="main-tag-count" id="mainTagCount"></div>
  </div>
  <div class="section-title">関連ハッシュタグの広がり</div>
  <div class="tree-wrap" id="treeWrap"></div>
</div>

<div class="footer">
  ※ note非公式APIを使用しています。データはリアルタイムで取得されます。<br>
  製作者：<a href="https://note.com/ai48start" target="_blank" rel="noopener noreferrer" style="color:#41c9b4; font-weight:500; text-decoration:none;">泰祥屋note店</a><br>
  <a href="https://note.com/ai48start" target="_blank" rel="noopener noreferrer" style="color:#41c9b4; font-weight:500; text-decoration:none;">https://note.com/ai48start</a>
</div>

<script>
// ★★★ここを書き換えてください★★★
var GAS_URL = "https://script.google.com/macros/s/AKfycbxgcUepdZgu6Jj1bCauuXb4iCapTGt_qhtqDL46UiVlO41qM43Q_MAkN08Fuc6xuGBBxA/exec";
// ★★★★★★★★★★★★★★★★★★

document.getElementById("tagInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doSearch();
});

var loadingMessages = [
  "noteからデータを取得しています...",
  "関連タグを展開しています...",
  "もう少しお待ちください..."
];
var msgTimer;

function doSearch() {
  var tag = document.getElementById("tagInput").value.trim().replace(/^#+/, "");
  if (!tag) return;

  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("error").classList.add("hidden");
  document.getElementById("results").classList.add("hidden");
  document.getElementById("searchBtn").disabled = true;

  var msgIdx = 0;
  document.getElementById("loadingMsg").textContent = loadingMessages[0];
  msgTimer = setInterval(function() {
    msgIdx = (msgIdx + 1) % loadingMessages.length;
    document.getElementById("loadingMsg").textContent = loadingMessages[msgIdx];
  }, 3000);

  fetch(GAS_URL + "?tag=" + encodeURIComponent(tag))
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      showResults(data);
    })
    .catch(function(err) {
      document.getElementById("error").textContent = "取得失敗: " + err.message;
      document.getElementById("error").classList.remove("hidden");
    })
    .finally(function() {
      clearInterval(msgTimer);
      document.getElementById("loading").classList.add("hidden");
      document.getElementById("searchBtn").disabled = false;
    });
}

function showResults(data) {
  var ht = data.hashtag;
  var expanded = data.expanded || [];

  document.getElementById("mainTagName").textContent = "#" + ht.name;
  document.getElementById("mainTagCount").innerHTML =
    Number(ht.count).toLocaleString() + '<span class="main-tag-count-sub"> 件の記事</span>';

  var treeWrap = document.getElementById("treeWrap");
  treeWrap.innerHTML = "";

  expanded.forEach(function(branch) {
    var div = document.createElement("div");
    div.className = "branch";

    var header = document.createElement("div");
    header.className = "branch-header";
    header.innerHTML =
      '<span class="branch-tag">#' + escapeHtml(branch.name) + '</span>' +
      '<span class="branch-count">' + Number(branch.count).toLocaleString() +
      '<span class="branch-count-label"> 件</span></span>';
    div.appendChild(header);

    var subWrap = document.createElement("div");
    if (branch.related && branch.related.length > 0) {
      subWrap.className = "sub-tags";
      branch.related.forEach(function(sub) {
        var btn = document.createElement("button");
        btn.className = "sub-tag";
        btn.innerHTML = "#" + escapeHtml(sub.name) +
          ' <span class="sub-tag-count">' + Number(sub.count).toLocaleString() + '</span>';
        btn.onclick = function() {
          document.getElementById("tagInput").value = sub.name;
          doSearch();
        };
        subWrap.appendChild(btn);
      });
    } else {
      subWrap.className = "no-related";
      subWrap.textContent = "関連タグなし";
    }
    div.appendChild(subWrap);
    treeWrap.appendChild(div);
  });

  document.getElementById("results").classList.remove("hidden");
}

function escapeHtml(str) {
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
</script>
</body>
</html>
